services:
  app:
    build: .
    container_name: pre-sales-api

    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - mongo

    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:8
    container_name: mongo-db

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: